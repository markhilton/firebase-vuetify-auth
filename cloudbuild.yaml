steps:
  # slack deployment status
  - name: "gcr.io/cloud-builders/curl"
    args:
      [
        "-X",
        "POST",
        "-H",
        "Content-type: application/json",
        "--data",
        '{"text":"`$REPO_NAME:$BRANCH_NAME$TAG_NAME` build started!"}',
        "${_WEBHOOK_URL}",
      ]

  # install dependencies
  - name: "node:20"
    entrypoint: "npm"
    args: ["ci"]

  # build the library
  - name: "node:20"
    entrypoint: "npm"
    args: ["run", "build"]

  # publish to npm registry (only on tagged builds)
  - name: "node:20"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ -n "$TAG_NAME" ]; then
          echo "//registry.npmjs.org/:_authToken=$_NPM_TOKEN" >> .npmrc
          sed -i 's/"version": "[^"]*"/"version": "'"$TAG_NAME"'"/' package.json
          npm publish
        fi

  # slack deployment status
  - name: "gcr.io/cloud-builders/curl"
    args:
      [
        "-X",
        "POST",
        "-H",
        "Content-type: application/json",
        "--data",
        '{"text":"`$REPO_NAME:$BRANCH_NAME$TAG_NAME` build completed!"}',
        "${_WEBHOOK_URL}",
      ]

timeout: 1500s

# env defaults
substitutions:
  _NPM_TOKEN: NPM registry private package
  _WEBHOOK_URL: slack_notification_webhook_url
